[package]
edition = "2021"
rust-version = "1.67.1"
name = "rustypipe"
version = "0.11.4"
authors = ["ThetaDev <thetadev@magenta.de>"]
build = false
include = [
    "/src",
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "!snapshots",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Client for the public YouTube / YouTube Music API (Innertube), inspired by NewPipe"
readme = "README.md"
keywords = [
    "youtube",
    "video",
    "music",
]
categories = [
    "api-bindings",
    "multimedia",
]
license = "GPL-3.0"
repository = "https://codeberg.org/ThetaDev/rustypipe"

[package.metadata.docs.rs]
